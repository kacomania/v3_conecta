name: cidadao_conecta
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # --- Core Infrastructure ---
  supabase_flutter: ^2.12.4
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  flutter_dotenv: ^6.0.1
  shared_preferences: ^2.5.5

  # --- Visual & Maps ---
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.8
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1

  # --- Camera & Files ---
  camerawesome: ^2.5.0
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.3
  intl: ^0.20.2

  # --- Geolocation ---
  geolocator: ^14.0.2

  # --- Offline-First (Sprint 29) ---
  sqflite: ^2.3.3
  connectivity_plus: ^6.1.4
  image_picker: ^1.2.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  google_sign_in: ^7.2.0
  mask_text_input_formatter: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.4
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - .env
